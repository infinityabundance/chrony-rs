# cargo-deny configuration
[advisories]
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
yanked = "warn"

[licenses]
unlicensed = "deny"
allow = ["GPL-2.0-only", "MIT", "Apache-2.0", "ISC", "BSD-2-Clause", "BSD-3-Clause", "CC0-1.0", "Unicode-3.0", "Unlicense"]
deny = []
copyleft = "allow"

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
skip-tree = [
    # webpki-roots and ring use older getrandom via rustls
    { name = "getrandom", version = "0.2" },
]

# A minimal, distro-shaped chrony configuration used as a parser fixture.
# Mirrors the common pattern shipped by several Linux distributions: a pool of
# public servers plus local drift persistence and a bounded initial step.
pool 2.pool.ntp.org iburst
server time.example.org minpoll 4 maxpoll 8
driftfile /var/lib/chrony/drift
makestep 1.0 3
rtcsync
